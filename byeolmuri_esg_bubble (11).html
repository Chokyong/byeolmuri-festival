<meta charset="UTF-8">

<title>그린대로, 제 11회 별무리 가족축제</title>
<script>
/* ── XLSX 생성기 (pako deflate 기반, Excel 완전 호환) ── */
const XLSXWriter = (() => {
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const enc = s => new TextEncoder().encode(s);

  function colName(c) {
    let n = ''; c++;
    while (c > 0) { n = String.fromCharCode(64 + (c % 26 || 26)) + n; c = Math.floor((c - 1) / 26); }
    return n;
  }

  function buildXmlParts(rows) {
    const ssMap = {}, ssList = [];
    rows.forEach(r => r.forEach(v => {
      const s = String(v);
      if (!(s in ssMap)) { ssMap[s] = ssList.length; ssList.push(s); }
    }));

    let sheetRows = '';
    rows.forEach((row, ri) => {
      let cells = '';
      row.forEach((val, ci) => {
        const addr = colName(ci) + (ri + 1);
        const si = ssMap[String(val)];
        const style = ri === 0 ? ' s="1"' : '';
        cells += `<c r="${addr}" t="s"${style}><v>${si}</v></c>`;
      });
      sheetRows += `<row r="${ri + 1}">${cells}</row>`;
    });

    const colW = [6,14,45,18].map((w,i)=>`<col min="${i+1}" max="${i+1}" width="${w}" customWidth="1"/>`).join('');

    return {
      '[Content_Types].xml': `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>`,
      '_rels/.rels': `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`,
      'xl/workbook.xml': `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="소감 기록" sheetId="1" r:id="rId1"/></sheets></workbook>`,
      'xl/_rels/workbook.xml.rels': `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/><Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`,
      'xl/worksheets/sheet1.xml': `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><cols>${colW}</cols><sheetData>${sheetRows}</sheetData></worksheet>`,
      'xl/sharedStrings.xml': `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${ssList.length}" uniqueCount="${ssList.length}">${ssList.map(s=>`<si><t xml:space="preserve">${esc(s)}</t></si>`).join('')}</sst>`,
      'xl/styles.xml': `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><fonts><font><sz val="11"/><name val="Arial"/></font><font><b/><sz val="11"/><name val="Arial"/><color rgb="FFFFFFFF"/></font></fonts><fills><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill><fill><patternFill patternType="solid"><fgColor rgb="FF2E9A5C"/><bgColor indexed="64"/></patternFill></fill></fills><borders><border><left/><right/><top/><bottom/><diagonal/></border></borders><cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs><cellXfs><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/><xf numFmtId="0" fontId="1" fillId="2" borderId="0" xfId="0" applyFont="1" applyFill="1"><alignment horizontal="center" vertical="center"/></xf></cellXfs><cellStyles><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles></styleSheet>`,
    };
  }

  /* ── CRC-32 ── */
  const CRC_TABLE = (() => {
    const t = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
      let c = i;
      for (let j = 0; j < 8; j++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
      t[i] = c;
    }
    return t;
  })();
  function crc32(buf) {
    let c = 0xFFFFFFFF;
    for (let i = 0; i < buf.length; i++) c = CRC_TABLE[(c ^ buf[i]) & 0xff] ^ (c >>> 8);
    return (c ^ 0xFFFFFFFF) >>> 0;
  }

  /* ── DEFLATE via raw deflate (store fallback) ── */
  function deflate(data) {
    // Use CompressionStream if available (Chrome 80+, Edge, Firefox 113+)
    return data; // fallback: store uncompressed (handled below)
  }

  /* ── ZIP builder using STORE method (no compression needed for xlsx validity) ── */
  function le16(n) { const b = new Uint8Array(2); new DataView(b.buffer).setUint16(0,n,true); return b; }
  function le32(n) { const b = new Uint8Array(4); new DataView(b.buffer).setUint32(0,n,true); return b; }

  function concat(...arrays) {
    const total = arrays.reduce((s,a)=>s+a.length,0);
    const out = new Uint8Array(total);
    let pos = 0;
    for (const a of arrays) { out.set(a,pos); pos+=a.length; }
    return out;
  }

  async function buildZip(files) {
    const entries = [];
    let offset = 0;

    for (const [name, str] of files) {
      const nameBytes = enc(name);
      const dataBytes = enc(str);
      const crc = crc32(dataBytes);
      const size = dataBytes.length;

      // Try DecompressionStream-based deflate
      let compressed = dataBytes;
      let method = 0; // STORE
      try {
        const cs = new CompressionStream('deflate-raw');
        const writer = cs.writable.getWriter();
        writer.write(dataBytes);
        writer.close();
        const chunks = [];
        const reader = cs.readable.getReader();
        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          chunks.push(value);
        }
        compressed = concat(...chunks);
        method = 8; // DEFLATE
      } catch(e) {
        compressed = dataBytes;
        method = 0;
      }

      const local = concat(
        new Uint8Array([0x50,0x4B,0x03,0x04]),
        le16(20), le16(0), le16(method),
        le16(0), le16(0), // time, date (zero)
        le32(crc),
        le32(compressed.length),
        le32(size),
        le16(nameBytes.length), le16(0),
        nameBytes,
        compressed
      );

      entries.push({ name, nameBytes, local, crc, compSize: compressed.length, uncompSize: size, method, offset });
      offset += local.length;
    }

    // Central directory
    const centralParts = entries.map(e => concat(
      new Uint8Array([0x50,0x4B,0x01,0x02]),
      le16(20), le16(20),
      le16(0), le16(e.method),
      le16(0), le16(0),
      le32(e.crc),
      le32(e.compSize),
      le32(e.uncompSize),
      le16(e.nameBytes.length), le16(0), le16(0), le16(0), le16(0),
      le32(0),
      le32(e.offset),
      e.nameBytes
    ));

    const centralSize = centralParts.reduce((s,c)=>s+c.length,0);
    const eocd = concat(
      new Uint8Array([0x50,0x4B,0x05,0x06,0x00,0x00,0x00,0x00]),
      le16(entries.length), le16(entries.length),
      le32(centralSize), le32(offset),
      le16(0)
    );

    return concat(...entries.map(e=>e.local), ...centralParts, eocd);
  }

  return {
    async download(rows, filename) {
      const parts = buildXmlParts(rows);
      const fileList = [
        ['[Content_Types].xml', parts['[Content_Types].xml']],
        ['_rels/.rels', parts['_rels/.rels']],
        ['xl/workbook.xml', parts['xl/workbook.xml']],
        ['xl/_rels/workbook.xml.rels', parts['xl/_rels/workbook.xml.rels']],
        ['xl/worksheets/sheet1.xml', parts['xl/worksheets/sheet1.xml']],
        ['xl/sharedStrings.xml', parts['xl/sharedStrings.xml']],
        ['xl/styles.xml', parts['xl/styles.xml']],
      ];
      const zip = await buildZip(fileList);
      const blob = new Blob([zip], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(a.href), 3000);
    }
  };
})();
</script>

function tick(){
  const w=W(),h=H();
  for(const id of shown){
    const p=physics[id],el=els[id];if(!p||!el)continue;
    const r=p.size/2;
    p.x+=p.vx;p.y+=p.vy;
    if(p.x-r<0){p.x=r;p.vx=Math.abs(p.vx);}
    if(p.x+r>w){p.x=w-r;p.vx=-Math.abs(p.vx);}
    if(p.y-r<0){p.y=r;p.vy=Math.abs(p.vy);}
    if(p.y+r>h){p.y=h-r;p.vy=-Math.abs(p.vy);}
    el.style.left=(p.x-r)+'px';el.style.top=(p.y-r)+'px';
  }
  requestAnimationFrame(tick);
}

    </div>
    <div id="sbar">불러오는 중...</div>
  </div>
</div>

<script>
const MAX_V=30,ROTATE_MS=30000;
const CANVAS=document.getElementById('canvas');
const SBAR=document.getElementById('sbar');
const TOAST=document.getElementById('toast');



let all=[],shown=[],els={},physics={},colorSeq=0,rotateTimer=null,rotatePtr=0;

const W=()=>CANVAS.offsetWidth;
const H=()=>CANVAS.offsetHeight-90;
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const COLORS=[
  {bg:'rgba(155,228,178,0.22)',bd:'rgba(90,198,128,0.58)',tx:'#143d22',sh:'rgba(255,255,255,0.68)'},
  {bg:'rgba(198,240,158,0.22)',bd:'rgba(138,208,98,0.58)',tx:'#223a08',sh:'rgba(255,255,255,0.68)'},
  {bg:'rgba(138,218,208,0.22)',bd:'rgba(78,188,168,0.58)',tx:'#083830',sh:'rgba(255,255,255,0.68)'},
  {bg:'rgba(252,232,148,0.22)',bd:'rgba(218,188,78,0.52)',tx:'#423600',sh:'rgba(255,255,255,0.68)'},
  {bg:'rgba(188,228,252,0.22)',bd:'rgba(108,183,228,0.52)',tx:'#082e4a',sh:'rgba(255,255,255,0.68)'},
  {bg:'rgba(238,198,252,0.2)',bd:'rgba(188,138,228,0.48)',tx:'#32105e',sh:'rgba(255,255,255,0.68)'},
  {bg:'rgba(252,198,178,0.2)',bd:'rgba(228,148,118,0.48)',tx:'#421c08',sh:'rgba(255,255,255,0.68)'},
  {bg:'rgba(178,242,218,0.22)',bd:'rgba(88,198,158,0.58)',tx:'#083828',sh:'rgba(255,255,255,0.68)'},
];

const sz=t=>{const l=t.length;return l<=10?96:l<=22?118:l<=38?140:162;};
const rv=()=>{const a=Math.random()*Math.PI*2,s=0.27+Math.random()*0.43;return{vx:Math.cos(a)*s,vy:Math.sin(a)*s};};

function svgBubble(c,size){
  const r=size/2,s=size;
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;pointer-events:none;">
    <circle cx="${r}" cy="${r}" r="${r-1}" fill="${c.bg}" stroke="${c.bd}" stroke-width="1.2"/>
    <ellipse cx="${r*.58}" cy="${r*.36}" rx="${r*.2}" ry="${r*.1}" fill="${c.sh}" opacity=".7" transform="rotate(-38,${r*.58},${r*.36})"/>
    <ellipse cx="${r*.46}" cy="${r*.55}" rx="${r*.07}" ry="${r*.035}" fill="${c.sh}" opacity=".45" transform="rotate(-38,${r*.46},${r*.55})"/>
    <circle cx="${r}" cy="${r}" r="${r-1}" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  </svg>`;
}

function makeEl(msg){
  const p=physics[msg.id],c=COLORS[msg.colorIdx];
  const el=document.createElement('div');
  el.className='bubble';
  el.style.cssText=`width:${p.size}px;height:${p.size}px;left:${p.x-p.size/2}px;top:${p.y-p.size/2}px;color:${c.tx};opacity:0;transform:scale(0.25);transition:opacity 0.55s ease,transform 0.55s ease`;
  el.innerHTML=svgBubble(c,p.size)+`<div class="b-inner">${msg.name?`<span class="b-name">${esc(msg.name)}</span>`:''}<span class="b-text">${esc(msg.text)}</span></div>`;
  return el;
}

const randPos=size=>{const m=size/2+8;return{x:m+Math.random()*(W()-m*2),y:m+Math.random()*(H()-m*2)};};
function edgePos(size){
  const w=W(),h=H(),r=size/2,e=Math.floor(Math.random()*4);
  if(e===0)return{x:r,y:r+Math.random()*(h-size)};
  if(e===1)return{x:w-r,y:r+Math.random()*(h-size)};
  if(e===2)return{x:r+Math.random()*(w-size),y:r};
  return{x:r+Math.random()*(w-size),y:h-r};
}

function showMsg(id,fromEdge){
  const msg=all.find(m=>m.id===id);if(!msg)return;
  const size=sz(msg.text);
  const pos=fromEdge?edgePos(size):randPos(size);
  physics[id]={...pos,...rv(),size};
  const el=makeEl(msg);
  CANVAS.appendChild(el);els[id]=el;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{el.style.opacity='1';el.style.transform='scale(1)';}));
}

function hideMsg(id){
  const el=els[id];if(!el)return;
  el.style.opacity='0';el.style.transform='scale(0.15)';
  setTimeout(()=>{el.remove();delete els[id];delete physics[id];},560);
}

const updateStatus=()=>SBAR.textContent=`비눗방울 ${shown.length}개 표시 중 · 전체 소감 ${all.length}개`;

function showToast(msg){
  TOAST.textContent=msg;TOAST.classList.add('show');
  setTimeout(()=>TOAST.classList.remove('show'),2200);
}

function resetTimer(){
  if(rotateTimer)clearTimeout(rotateTimer);
  if(all.length>MAX_V)rotateTimer=setTimeout(doRotate,ROTATE_MS);
}

function doRotate(){
  if(!all.length)return;
  const oldId=shown.shift();hideMsg(oldId);
  const notShown=all.filter(m=>!shown.includes(m.id));
  let next;
  if(notShown.length){next=notShown[rotatePtr%notShown.length];rotatePtr++;}
  else{next=all[0];rotatePtr=1;}
  shown.push(next.id);showMsg(next.id,true);
  updateStatus();resetTimer();
}

/* ── Firebase 연동 ── */
let fbReady = false;
let firstLoad = true;

function saveAll(){} // Firebase가 담당

function addMsgToFirebase(name, text, colorIdx, createdAt){
  if(!fbReady) return;
  window._fbdb.ref('messages').push({ name, text, colorIdx, createdAt });
}

function addMsg(name, text){
  if(!fbReady){ showToast('서버 연결 중이에요. 잠시 후 다시 시도해주세요.'); return; }
  const colorIdx = colorSeq % COLORS.length; colorSeq++;
  addMsgToFirebase(name.trim(), text.trim(), colorIdx, Date.now());
  showToast('🌿 소감이 등록됐어요!');
}

function loadAll(){
  if(!fbReady){
    window.addEventListener('firebase-ready', loadAll, { once: true });
    return;
  }

  window._fbdb.ref('messages').on('value', snapshot => {
    const data = snapshot.val();

    // Firebase 데이터 → 배열로 변환
    const newAll = [];
    if(data){
      Object.entries(data).forEach(([fbKey, m]) => {
        // id는 createdAt 기반 고유값 (float 충돌 방지)
        newAll.push({
          id: fbKey,       // fbKey를 id로 직접 사용 (고유함)
          fbKey,
          name: m.name || '',
          text: m.text || '',
          colorIdx: m.colorIdx || 0,
          createdAt: m.createdAt || 0
        });
      });
      newAll.sort((a, b) => a.createdAt - b.createdAt);
    }

    if(firstLoad){
      // 첫 로드: Firebase 데이터 전부 표시
      firstLoad = false;
      all = newAll;
      if(all.length) colorSeq = all.reduce((mx,m) => Math.max(mx, m.colorIdx+1), 0) % COLORS.length;
      const init = all.slice(-Math.min(MAX_V, all.length));
      init.forEach((m, i) => setTimeout(() => { shown.push(m.id); showMsg(m.id, false); }, i * 60));
      setTimeout(() => { updateStatus(); resetTimer(); }, init.length * 60 + 100);
    } else {
      // 이후 변경: 추가/삭제 diff 처리
      const oldKeys = new Set(all.map(m => m.fbKey));
      const newKeys = new Set(newAll.map(m => m.fbKey));

      // 삭제된 항목 제거
      all.filter(m => !newKeys.has(m.fbKey)).forEach(m => {
        shown = shown.filter(s => s !== m.id);
        hideMsg(m.id);
      });

      // 새로 추가된 항목
      const added = newAll.filter(m => !oldKeys.has(m.fbKey));
      all = newAll;
      if(all.length) colorSeq = all.reduce((mx,m) => Math.max(mx, m.colorIdx+1), 0) % COLORS.length;

      added.forEach(m => {
        if(shown.length < MAX_V){
          shown.push(m.id); showMsg(m.id, false);
        } else {
          const oldId = shown.shift(); hideMsg(oldId);
          shown.push(m.id); showMsg(m.id, true);
          resetTimer();
        }
      });
      updateStatus();
      renderLog();  // 기록창 열려있으면 갱신
    }
    updateStatus();
  });
}

tick();

// Firebase SDK 로드 완료 후 실행
function initFirebase(){
  fbReady = true;
  loadAll();
}


function tick(){
  const w=W(),h=H();
  for(const id of shown){
    const p=physics[id],el=els[id];if(!p||!el)continue;
    const r=p.size/2;
    p.x+=p.vx;p.y+=p.vy;
    if(p.x-r<0){p.x=r;p.vx=Math.abs(p.vx);}
    if(p.x+r>w){p.x=w-r;p.vx=-Math.abs(p.vx);}
    if(p.y-r<0){p.y=r;p.vy=Math.abs(p.vy);}
    if(p.y+r>h){p.y=h-r;p.vy=-Math.abs(p.vy);}
    el.style.left=(p.x-r)+'px';el.style.top=(p.y-r)+'px';
  }
  requestAnimationFrame(tick);
}

/* log modal */
function fmtDate(ts){
  const d=new Date(ts);
  const pad=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function renderLog(){
  const tbody=document.getElementById('log-tbody');
  const empty=document.getElementById('log-empty');
  const table=document.getElementById('log-table');
  const count=document.getElementById('log-count');
  const footer=document.getElementById('log-footer');
  const btnDelAll=document.getElementById('btn-del-all');
  tbody.innerHTML='';
  if(!all.length){
    empty.style.display='block';table.style.display='none';
    count.textContent='';btnDelAll.style.display='none';
  } else {
    empty.style.display='none';table.style.display='table';
    btnDelAll.style.display='';
    all.forEach((m,i)=>{
      const tr=document.createElement('tr');
      tr.dataset.id=m.id;
      tr.innerHTML=`<td style="color:rgba(60,120,80,0.6);font-size:11px">${i+1}</td><td>${esc(m.name||'익명')}</td><td>${esc(m.text)}</td><td style="font-size:11px;color:rgba(60,120,80,0.65);white-space:nowrap">${fmtDate(m.createdAt)}</td><td style="text-align:center;padding:6px 10px"><button class="btn-del-row" title="삭제" data-fbkey="${m.fbKey}">✕</button></td>`;
      tbody.appendChild(tr);
    });
    count.textContent=`총 ${all.length}개의 소감`;
  }
}

function openLog(){renderLog();document.getElementById('log-overlay').classList.add('open');}

function openPwModal(){
  const overlay=document.getElementById('pw-overlay');
  const inp=document.getElementById('pw-inp');
  const err=document.getElementById('pw-error');
  inp.value=''; err.textContent='';
  overlay.classList.add('open');
  setTimeout(()=>inp.focus(),100);
}

function checkPw(){
  const inp=document.getElementById('pw-inp');
  const err=document.getElementById('pw-error');
  if(inp.value==='ggwc7255'){
    document.getElementById('pw-overlay').classList.remove('open');
    openLog();
  } else {
    err.textContent='비밀번호가 틀렸어요.';
    inp.value='';
    inp.focus();
  }
}

document.getElementById('pw-ok').onclick=checkPw;
document.getElementById('pw-cancel').onclick=()=>{
  document.getElementById('pw-overlay').classList.remove('open');
};
document.getElementById('pw-inp').addEventListener('keydown',e=>{
  if(e.key==='Enter') checkPw();
});

/* confirm helper */
let _confirmCb=null;
function askConfirm(msg,sub,cb){
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-sub').textContent=sub||'이 작업은 되돌릴 수 없어요.';
  _confirmCb=cb;
  document.getElementById('confirm-overlay').classList.add('open');
}
document.getElementById('confirm-ok').onclick=()=>{
  document.getElementById('confirm-overlay').classList.remove('open');
  if(_confirmCb){_confirmCb();_confirmCb=null;}
};
document.getElementById('confirm-cancel').onclick=()=>{
  document.getElementById('confirm-overlay').classList.remove('open');_confirmCb=null;
};

/* delete single */
document.getElementById('log-tbody').addEventListener('click',e=>{
  const btn=e.target.closest('.btn-del-row');if(!btn)return;
  const fbKey=btn.dataset.fbkey;
  const msg=all.find(m=>m.fbKey===fbKey);
  const label=msg?(msg.name||'익명')+' - "'+msg.text.slice(0,18)+(msg.text.length>18?'…':'')+'"':'이 소감';
  askConfirm(`${label}을(를) 삭제할까요?`,'삭제 후 복구할 수 없어요.',()=>{
    deleteOne(fbKey);
  });
});

function deleteOne(fbKey){
  if(fbReady){
    window._fbdb.ref('messages/'+fbKey).remove();
  }
  // UI는 onValue 리스너가 자동으로 처리
  const msg=all.find(m=>m.fbKey===fbKey);
  if(msg&&shown.includes(msg.id)){
    shown=shown.filter(s=>s!==msg.id);
    hideMsg(msg.id);
    const notShown=all.filter(m=>!shown.includes(m.id));
    if(notShown.length&&shown.length<MAX_V){
      shown.push(notShown[0].id);showMsg(notShown[0].id,true);
    }
    resetTimer();
  }
  showToast('소감이 삭제됐어요.');
}

/* delete all */
document.getElementById('btn-del-all').onclick=()=>{
  askConfirm(`소감 ${all.length}개를 모두 삭제할까요?`,'삭제 후 복구할 수 없어요.',()=>{
    if(fbReady){ window._fbdb.ref('messages').remove(); }
    [...shown].forEach(id=>hideMsg(id));
    shown=[];all=[];physics={};
    if(rotateTimer)clearTimeout(rotateTimer);
    updateStatus();renderLog();showToast('전체 소감이 삭제됐어요.');
  });
};

async function downloadExcel(){
  if(!all.length){showToast('다운로드할 소감이 없어요.');return;}
  const rows=[['번호','이름','소감 내용','등록 시각']];
  all.forEach((m,i)=>rows.push([String(i+1),m.name||'익명',m.text,fmtDate(m.createdAt)]));
  showToast('⏳ 파일 생성 중...');
  await XLSXWriter.download(rows,'별무리가족축제_소감기록.xlsx');
  showToast('📥 엑셀 파일이 다운로드됐어요!');
}

document.getElementById('btn-sub').onclick=submit;
document.getElementById('btn-log').onclick=openPwModal;
document.getElementById('btn-close').onclick=()=>document.getElementById('log-overlay').classList.remove('open');
document.getElementById('btn-dl').onclick=downloadExcel;
document.getElementById('log-overlay').onclick=e=>{if(e.target===document.getElementById('log-overlay'))document.getElementById('log-overlay').classList.remove('open');};
document.getElementById('inp-text').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});

function submit(){
  const ni=document.getElementById('inp-name'),ti=document.getElementById('inp-text');
  const text=ti.value.trim();if(!text){ti.focus();return;}
  addMsg(ni.value,text);ni.value='';ti.value='';ti.focus();
}

</script>
